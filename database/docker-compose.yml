version: '3.8'

services:
  db:
    image: postgres:16
    container_name: santacruz_db_container
    restart: always
    environment:
      POSTGRES_DB: santacruz_db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: